[plugins]
"rocks-config.nvim" = "3.2.0"
"rocks-git.nvim" = "2.5.10"

# deps
"plenary.nvim" = "scm"
nvim-web-devicons = "0.100"
alpha-nvim = "scm"
"telescope.nvim" = "scm"
"neo-tree.nvim" = "3.40.0"
# "chadtree" = { git = "ms-jpq/chadtree", build = "python3 -m chadtree deps" }
# "sfm.nvim" = { git = "dinhhuy258/sfm.nvim" }

# Appearance
"lualine.nvim" = "scm"
"dropbar.nvim" = "14.2.1"

# colorschemes
# catpuccin = { version = "1.6.0", opt = true }
"material.nvim" = { version = "scm" }
# "barbar.nvim" = { git = "romgrk/barbar.nvim" }

# LSP
"mason.nvim" = { version = "2.2.1" }
"mason-lspconfig.nvim" = { version = "2.2.0" }
nvim-lspconfig = { version = "2.8.0" }
"neodev.nvim" = { version = "3.0.0" }

# cmp
nvim-cmp = "scm"
cmp_luasnip = { version = "scm" }
cmp-nvim-lsp = { version = "scm" }
cmp-buffer = { version = "scm" }
cmp-path = { version = "scm" }
cmp-cmdline = { version = "scm" }

# treesitter
"rocks-treesitter.nvim" = "1.3.1"

# Utilities
[plugins."resession.nvim"]
git = "stevearc/resession.nvim"
rev = "v1.2.1"

# file manager
# fm-nvim = { git = "is0n/fm-nvim" }
[plugins."tfm.nvim"]
git = "Rolv-Apneseth/tfm.nvim"
rev = "a74ac5333f030db3603d9f076d220e8d24621365"

# tabbing
[plugins."scope.nvim"]
git = "tiagovla/scope.nvim"
rev = "228aabdb1b9cc74f0c0ccec88e79873857236e49"

[plugins.nvim-cokeline]
git = "willothy/nvim-cokeline"
rev = "v0.4.0"

# tree-sitter parsers (managed by rocks-treesitter.nvim)
# tree-sitter-lua = "scm"
# tree-sitter-toml = "0.0.2"
# tree-sitter-vimdoc = "scm"
# tree-sitter-nix = "scm"
# tree-sitter-yaml = "scm"
# tree-sitter-requirements = "scm"
# tree-sitter-markdown = "scm"
# tree-sitter-bash = "scm"
# tree-sitter-python = "scm"
# tree-sitter-gitignore = "scm"
# tree-sitter-just = "scm"
# tree-sitter-git_config = "scm"
# tree-sitter-cpp = "scm"
# tree-sitter-make = "scm"
# tree-sitter-c = "scm"

[bundles.lsp]
items = [
    "neodev.nvim",
    "nvim-lspconfig",
    "mason.nvim",
    "mason-lspconfig.nvim",
    "nvim-cmp"
]
config = "plugins.bundles.lsp"

[bundles.cmp]
items = [
    "nvim-cmp",
    "cmp_luasnip",
    "cmp-nvim-lsp",
    "cmp-buffer",
    "cmp-path",
    "cmp-cmdline"
]
config = "plugins.bundles.cmp"

[config]
plugins_dir = "plugins/"
auto_setup = false

[treesitter]
auto_highlight = "all"
auto_install = true
